<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anime Video Generator AI - Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Anime Video Generator</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        {% if message %}<p class="success">{{ message }}</p>{% endif %}
        <div class="tabs">
            <button onclick="document.getElementById('emailForm').style.display='block'; document.getElementById('phoneForm').style.display='none';">Email</button>
            <button onclick="document.getElementById('phoneForm').style.display='block'; document.getElementById('emailForm').style.display='none';">Phone (Firebase)</button>
        </div>
        <form id="emailForm" action="{% if request.query_params.get('is_signup') %}/signup{% else %}/login{% endif %}" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-primary">{% if request.query_params.get('is_signup') %}Sign Up{% else %}Login{% endif %}</button>
        </form>
        <form id="phoneForm" action="/login" method="post" style="display:none;">
            <input type="text" name="phone" placeholder="+1234567890" required>
            <button type="submit" class="btn-secondary">Send OTP</button>
            <p class="small">Uses Firebase Auth (Requires config)</p>
        </form>
        <p class="toggle-link">{% if request.query_params.get('is_signup') %}<a href="/">Back to Login</a>{% else %}<a href="/?is_signup=1">Create Account</a>{% endif %}</p>
    </div>
</body>
</html>
