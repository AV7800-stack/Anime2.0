services:
  # Backend Service
  - type: web
    name: anime2-backend
    env: python
    plan: free
    buildCommand: "pip install -r src/backend/requirements.txt"
    startCommand: "cd src/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
    autoDeploy: true
    
  # Frontend Service  
  - type: web
    name: anime2-frontend
    env: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: frontend/.next
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://anime2-backend.onrender.com
    autoDeploy: true
