services:
  # Backend Service - Production Ready
  - type: web
    name: anime2-backend
    env: python
    plan: free
    buildCommand: "pip install -r src/backend/requirements.txt"
    startCommand: "cd src/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
    healthCheckTimeout: 30
    healthCheckInterval: 10
    healthCheckGracePeriod: 10
    autoDeploy: true
    
  # Frontend Service (if exists)
  - type: web
    name: anime2-frontend
    env: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: frontend/.next
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://anime2-backend.onrender.com
    autoDeploy: true
